<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClusterMesh Worker</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --ok: #10b981;
      --warn: #f59e0b;
      --err: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.65rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.ok { background: rgba(16,185,129,.15); color: var(--ok); }
    .badge.warn { background: rgba(245,158,11,.15); color: var(--warn); }
    .badge.err { background: rgba(239,68,68,.15); color: var(--err); }
    .badge.idle { background: rgba(148,163,184,.15); color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .card h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .card .value { font-size: 1.5rem; font-weight: 700; }
    .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
    .bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 0.75rem;
      overflow: hidden;
    }
    .bar > div {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .links { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .links a:hover { background: var(--card); }
    .procs { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .procs th, .procs td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--border); }
    .procs th { color: var(--muted); font-weight: 500; }
    footer { margin-top: 2rem; font-size: 0.75rem; color: var(--muted); text-align: center; }
    .err-box {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ClusterMesh Worker</h1>
      <p id="hostname" style="color:var(--muted);font-size:0.85rem;margin-top:0.25rem">—</p>
    </div>
    <span id="state-badge" class="badge idle">Starting</span>
  </header>
  <div id="error" class="err-box" style="display:none"></div>
  <div class="grid">
    <div class="card">
      <h2>CPU</h2>
      <div class="value" id="cpu-val">—</div>
      <div class="sub" id="cpu-sub">—</div>
      <div class="bar"><div id="cpu-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <h2>Memory</h2>
      <div class="value" id="mem-val">—</div>
      <div class="sub" id="mem-sub">—</div>
      <div class="bar"><div id="mem-bar" style="width:0%"></div></div>
    </div>
    <div class="card">
      <h2>Cluster</h2>
      <div class="value" id="driver-val" style="font-size:1rem">—</div>
      <div class="sub" id="cluster-sub">—</div>
    </div>
    <div class="card">
      <h2>Tasks</h2>
      <div class="value" id="tasks-val">0</div>
      <div class="sub" id="tasks-sub">Active on this worker</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:1rem">
    <h2>System</h2>
    <div class="sub" id="sys-sub">—</div>
    <div class="links" id="links"></div>
  </div>
  <div class="card">
    <h2>Top Processes</h2>
    <table class="procs">
      <thead><tr><th>Process</th><th>CPU</th><th>Threads</th><th>Mem</th></tr></thead>
      <tbody id="procs"></tbody>
    </table>
  </div>
  <footer>ClusterMesh worker · refreshes every 3s</footer>
  <script>
    function badgeClass(state) {
      const s = (state || "").toUpperCase();
      if (s === "HEALTHY") return "ok";
      if (s === "PREEMPTED" || s === "SUSPECTED") return "warn";
      if (s === "ERROR" || s === "DEAD") return "err";
      return "idle";
    }
    async function refresh() {
      try {
        const r = await fetch("/api/v1/worker/status");
        const d = await r.json();
        document.getElementById("hostname").textContent = d.hostname + " · " + d.node_id;
        const b = document.getElementById("state-badge");
        b.textContent = d.node_state;
        b.className = "badge " + badgeClass(d.node_state);
        document.getElementById("cpu-val").textContent = d.cpu_utilization_pct + "%";
        document.getElementById("cpu-sub").textContent = d.cpu_physical + " physical / " + d.cpu_cores + " logical cores";
        document.getElementById("cpu-bar").style.width = Math.min(100, d.cpu_utilization_pct) + "%";
        const used = (d.ram_gb_total - d.ram_gb_free).toFixed(1);
        document.getElementById("mem-val").textContent = used + " GB";
        document.getElementById("mem-sub").textContent = "of " + d.ram_gb_total + " GB · " + d.ram_gb_free + " GB free";
        document.getElementById("mem-bar").style.width = d.ram_gb_total ? ((used / d.ram_gb_total) * 100) + "%" : "0%";
        document.getElementById("driver-val").textContent = d.driver_address || "—";
        document.getElementById("cluster-sub").textContent = d.registered
          ? "Connected · site " + d.location + " · up " + d.uptime_seconds + "s"
          : "Not registered";
        document.getElementById("tasks-val").textContent = d.active_tasks;
        document.getElementById("sys-sub").textContent =
          d.process_count + " processes · " + d.thread_count + " threads · " + d.libraries_count + " libraries";
        const links = document.getElementById("links");
        links.innerHTML = "";
        if (d.dashboard_url) {
          const a = document.createElement("a");
          a.href = d.dashboard_url; a.target = "_blank"; a.textContent = "Cluster dashboard ↗";
          links.appendChild(a);
        }
        const err = document.getElementById("error");
        if (d.last_error) { err.style.display = "block"; err.textContent = d.last_error; }
        else err.style.display = "none";
        const tbody = document.getElementById("procs");
        const top = (d.host_metrics && d.host_metrics.processes && d.host_metrics.processes.top) || [];
        tbody.innerHTML = top.slice(0, 6).map(p =>
          `<tr><td>${p.name}</td><td>${p.cpu_pct}%</td><td>${p.threads}</td><td>${p.memory_mb}M</td></tr>`
        ).join("") || "<tr><td colspan='4' style='color:var(--muted)'>—</td></tr>";
      } catch (e) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = "Cannot reach worker API";
      }
    }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
